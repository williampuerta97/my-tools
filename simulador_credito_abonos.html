<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador de Crédito con Abonos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --text: #1a1f2e;
      --muted: #5c6478;
      --accent: #3d6ee8;
      --accent-soft: #e8efff;
      --border: #e2e6ef;
      --success: #0d9f6e;
      --warn-bg: #fff8e6;
      --warn-border: #f0d78c;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(26, 31, 46, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(165deg, var(--bg) 0%, #eef1f9 50%, #e8ecf6 100%);
      color: var(--text);
      line-height: 1.45;
      padding: clamp(1rem, 4vw, 2rem);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: clamp(1.35rem, 3vw, 1.65rem);
      font-weight: 700;
      margin: 0 0 0.35rem 0;
      letter-spacing: -0.02em;
    }

    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: clamp(1rem, 3vw, 1.5rem);
      margin-bottom: 1.25rem;
    }

    .card h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 0 1rem 0;
      font-weight: 600;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 160px), 1fr));
      gap: 0.85rem 1rem;
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 0.55rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      background: var(--surface);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .field input.input-cop {
      font-variant-numeric: tabular-nums;
    }

    .actions {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }

    button[type="submit"] {
      background: linear-gradient(135deg, var(--accent) 0%, #2f5bd4 100%);
      color: #fff;
      border: none;
      padding: 0.65rem 1.35rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 2px 12px rgba(61, 110, 232, 0.35);
      transition: transform 0.12s, box-shadow 0.12s;
    }

    button[type="submit"]:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(61, 110, 232, 0.4);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    .hint {
      font-size: 0.82rem;
      color: var(--muted);
      margin: 0 0 0.75rem 0;
    }

    .table-container {
      overflow-x: auto;
      max-width: 100%;
      -webkit-overflow-scrolling: touch;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    th,
    td {
      padding: 0.55rem 0.65rem;
      border-bottom: 1px solid var(--border);
      text-align: right;
      white-space: nowrap;
    }

    th {
      background: linear-gradient(180deg, var(--accent-soft) 0%, #dfe8ff 100%);
      color: #1e3a8a;
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 2px solid #c7d7ff;
    }

    tbody tr:hover {
      background: #fafbfd;
    }

    tr.mes-actual {
      background: var(--warn-bg);
      box-shadow: inset 3px 0 0 #e6a800;
    }

    tr.mes-actual td {
      font-weight: 600;
    }

    td:first-child,
    th:first-child {
      text-align: center;
    }

    td.celda-abono {
      padding: 0.35rem 0.45rem;
      min-width: 200px;
      white-space: normal;
    }

    td.celda-abono .abono-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
      justify-content: flex-end;
    }

    td.celda-abono input.input-cop-abono {
      flex: 1 1 100px;
      min-width: 0;
      margin: 0;
      padding: 0.35rem 0.45rem;
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
    }

    td.celda-abono select {
      margin: 0;
      padding: 0.35rem 0.35rem;
      font-size: 0.78rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      max-width: 78px;
    }

    #resultado h3 {
      margin: 0 0 0.5rem 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    @media (max-width: 600px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Simulador de crédito con abonos</h1>
      <p>Amortización con abonos extraordinarios (cuota o plazo). Valores en pesos colombianos.</p>
    </header>

    <form id="formulario" class="card" autocomplete="off">
      <h2>Parámetros</h2>
      <div class="form-grid">
        <div class="field">
          <label for="monto">Monto del crédito</label>
          <input type="text" inputmode="numeric" class="input-cop" id="monto" data-default="19440000" required />
        </div>
        <div class="field">
          <label for="tasa">Tasa E.A. (%)</label>
          <input type="number" step="any" id="tasa" value="21.99" required />
        </div>
        <div class="field">
          <label for="plazo">Plazo (meses)</label>
          <input type="number" id="plazo" value="60" min="1" required />
        </div>
        <div class="field">
          <label for="fechaInicio">Fecha inicio</label>
          <input type="date" id="fechaInicio" value="2026-04-06" required />
        </div>
        <div class="field">
          <label for="seguros">Seguros (mensual)</label>
          <input type="text" inputmode="numeric" class="input-cop" id="seguros" data-default="54587" required />
        </div>
        <div class="field">
          <label for="otrosConceptos">Otros conceptos (mensual)</label>
          <input type="text" inputmode="numeric" class="input-cop" id="otrosConceptos" data-default="0" required />
        </div>
      </div>
      <div class="actions">
        <button type="submit">Calcular</button>
      </div>
    </form>

    <div id="resultado"></div>
  </div>

  <script>
    const formatoCOP = (valor) =>
      parseFloat(valor).toLocaleString("es-CO", { style: "currency", currency: "COP", maximumFractionDigits: 0 });

    function parseCOPInput(str) {
      const digits = String(str ?? "").replace(/\D/g, "");
      if (digits === "") return 0;
      const n = parseInt(digits, 10);
      return Number.isFinite(n) ? n : 0;
    }

    function formatCOPInputValue(num) {
      const n = typeof num === "number" ? num : parseCOPInput(String(num));
      return n.toLocaleString("es-CO", { style: "currency", currency: "COP", maximumFractionDigits: 0 });
    }

    function attachCOPInput(el) {
      const apply = () => {
        const n = parseCOPInput(el.value);
        el.value = formatCOPInputValue(n);
      };
      el.addEventListener("focus", () => {
        const n = parseCOPInput(el.value);
        el.value = n === 0 ? "" : String(n);
        el.select();
      });
      el.addEventListener("input", () => {
        const n = parseCOPInput(el.value);
        el.value = formatCOPInputValue(n);
      });
      el.addEventListener("blur", apply);
    }

    function initCOPFields() {
      document.querySelectorAll(".input-cop").forEach((el) => {
        const def = el.dataset.default;
        if (def !== undefined) el.value = formatCOPInputValue(parseInt(def, 10) || 0);
        attachCOPInput(el);
      });
    }

    function calcularAmortizacion(monto, tasaEA, plazo, fechaInicio, valorSeguros, otrosConceptos, abonos) {
      const tasaMensual = Math.pow(1 + tasaEA, 1 / 12) - 1;
      let saldo = monto;
      let cuotas = plazo;
      let cuotaBase = saldo * (tasaMensual / (1 - Math.pow(1 + tasaMensual, -cuotas)));
      const valorSeguro = valorSeguros;
      const otros = otrosConceptos;
      const tabla = [];

      for (let i = 1; i <= cuotas; i++) {
        const interes = saldo * tasaMensual;
        let abonoCapital = cuotaBase - interes;
        const abonoExtra = abonos.find((a) => a.mes === i);

        if (abonoExtra && abonoExtra.valor > 0) {
          saldo -= abonoCapital + abonoExtra.valor;
          if (abonoExtra.tipo === "plazo") {
            const nuevasCuotas = Math.ceil(
              Math.log(cuotaBase / (cuotaBase - saldo * tasaMensual)) / Math.log(1 + tasaMensual)
            );
            cuotas = i + nuevasCuotas;
          } else if (abonoExtra.tipo === "cuota") {
            cuotaBase = saldo * (tasaMensual / (1 - Math.pow(1 + tasaMensual, -(cuotas - i))));
            abonoCapital = cuotaBase - interes;
          }
        } else {
          saldo -= abonoCapital;
        }

        const extraPago = abonoExtra && abonoExtra.valor > 0 ? abonoExtra.valor : 0;
        const cuotaTotal = cuotaBase + valorSeguro + otros + extraPago;
        const fechaCuota = new Date(fechaInicio.getFullYear(), fechaInicio.getMonth() + i - 1);
        const hoy = new Date();
        const esMesActual =
          fechaCuota.getFullYear() === hoy.getFullYear() && fechaCuota.getMonth() === hoy.getMonth();

        tabla.push({
          cuota: i,
          fecha: fechaCuota.toLocaleDateString("es-CO"),
          esMesActual,
          interes: formatoCOP(interes),
          abonoCapital: formatoCOP(abonoCapital),
          abonoExtraValor: abonoExtra && abonoExtra.valor > 0 ? abonoExtra.valor : 0,
          abonoExtraTipo: abonoExtra && abonoExtra.valor > 0 ? abonoExtra.tipo || "plazo" : "",
          seguro: formatoCOP(valorSeguro),
          otros: formatoCOP(otros),
          cuotaTotal: formatoCOP(cuotaTotal),
          saldo: saldo < 0 ? formatoCOP(0) : formatoCOP(saldo),
        });

        if (saldo <= 0) break;
      }
      return tabla;
    }

    function leerAbonosDesdeTabla() {
      const rows = document.querySelectorAll("#resultado table tbody tr");
      const abonos = [];
      rows.forEach((tr) => {
        const input = tr.querySelector(".celda-abono input[data-mes].input-cop-abono");
        const select = tr.querySelector(".celda-abono select[data-mes]");
        if (input && select) {
          const mes = parseInt(input.dataset.mes, 10);
          const valor = parseCOPInput(input.value);
          const tipo = valor > 0 ? select.value || "plazo" : "plazo";
          if (valor > 0) abonos.push({ mes, tipo, valor });
        }
      });
      return abonos;
    }

    function renderizarTabla(tabla) {
      const html = `
        <div class="card">
          <h3>Tabla de amortización</h3>
          <p class="hint">Edita valor y tipo en «Ab. extra» para recalcular automáticamente.</p>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Fecha</th>
                  <th>Interés</th>
                  <th>Ab. capital</th>
                  <th>Ab. extra / tipo</th>
                  <th>Seguro</th>
                  <th>Otros</th>
                  <th>Cuota total</th>
                  <th>Saldo</th>
                </tr>
              </thead>
              <tbody>
                ${tabla
                  .map(
                    (row) => `
              <tr${row.esMesActual ? ' class="mes-actual"' : ""}>
                <td>${row.cuota}</td>
                <td>${row.fecha}</td>
                <td>${row.interes}</td>
                <td>${row.abonoCapital}</td>
                <td class="celda-abono">
                  <div class="abono-row">
                    <input type="text" inputmode="numeric" class="input-cop-abono input-cop" data-mes="${row.cuota}" value="${row.abonoExtraValor ? formatCOPInputValue(row.abonoExtraValor) : ""}" placeholder="$ 0" />
                    <select data-mes="${row.cuota}">
                      <option value="">—</option>
                      <option value="cuota" ${row.abonoExtraTipo === "cuota" ? "selected" : ""}>Cuota</option>
                      <option value="plazo" ${row.abonoExtraTipo === "plazo" ? "selected" : ""}>Plazo</option>
                    </select>
                  </div>
                </td>
                <td>${row.seguro}</td>
                <td>${row.otros}</td>
                <td>${row.cuotaTotal}</td>
                <td>${row.saldo}</td>
              </tr>`
                  )
                  .join("")}
              </tbody>
            </table>
          </div>
        </div>`;
      document.getElementById("resultado").innerHTML = html;
    }

    function recalcularDesdeTabla() {
      const tablaExistente = document.querySelector("#resultado table tbody");
      if (!tablaExistente) return;
      const abonos = leerAbonosDesdeTabla();
      ejecutarCalculo(abonos);
    }

    function ejecutarCalculo(abonos) {
      const monto = parseCOPInput(document.getElementById("monto").value);
      const tasaEA = parseFloat(document.getElementById("tasa").value) / 100;
      const plazo = parseInt(document.getElementById("plazo").value, 10);
      const fechaInicio = new Date(document.getElementById("fechaInicio").value);
      const valorSeguros = parseCOPInput(document.getElementById("seguros").value);
      const otrosConceptos = parseCOPInput(document.getElementById("otrosConceptos").value);
      const tabla = calcularAmortizacion(monto, tasaEA, plazo, fechaInicio, valorSeguros, otrosConceptos, abonos);
      renderizarTabla(tabla);
    }

    document.getElementById("formulario").addEventListener("submit", function (e) {
      e.preventDefault();
      ejecutarCalculo([]);
    });

    const resultadoEl = document.getElementById("resultado");
    resultadoEl.addEventListener("focusin", function (e) {
      const el = e.target;
      if (!el.classList || !el.classList.contains("input-cop-abono")) return;
      const n = parseCOPInput(el.value);
      el.value = n === 0 ? "" : String(n);
      el.select();
    });
    resultadoEl.addEventListener("input", function (e) {
      const el = e.target;
      if (!el.classList || !el.classList.contains("input-cop-abono")) return;
      const n = parseCOPInput(el.value);
      el.value = formatCOPInputValue(n);
    });
    resultadoEl.addEventListener("focusout", function (e) {
      const el = e.target;
      if (!el.classList || !el.classList.contains("input-cop-abono")) return;
      const n = parseCOPInput(el.value);
      el.value = formatCOPInputValue(n);
    });
    resultadoEl.addEventListener("change", function (e) {
      if (e.target.closest(".celda-abono")) recalcularDesdeTabla();
    });

    initCOPFields();
  </script>
</body>
</html>
